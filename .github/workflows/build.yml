name: Build APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build native libs + APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: |
            go.sum
            mobile/go.sum

      - name: Verify Go bridge compiles (linux quick-check)
        run: |
          go build ./internal/...

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            ndk;27.0.12077973

      - name: Build Go c-shared libraries for Android ABIs
        run: bash scripts/build-android-libs.sh

      - name: Inspect jniLibs
        run: find android/app/src/main/jniLibs -name '*.so' -printf '%p  %s bytes\n' | sort

      - name: Build APK (debug + release)
        working-directory: android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: List APKs
        run: find android/app/build/outputs/apk -name '*.apk' -printf '%p  %s bytes\n' | sort

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: grok-proxy-plus-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: grok-proxy-plus-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
